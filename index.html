<!DOCTYPE html>
<html class="staticrypt-html" lang="sv">
    <head>
        <meta charset="utf-8" />
        <title>Dura Care — förhandsvisning</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="noindex, nofollow" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            :root{
                --forest:#45593A; --forest-deep:#2F3D29; --moss:#87AD8A;
                --bone:#F2EEE4; --bone-card:#FFFFFF; --hairline:#E7E0E0;
                --fg:#0b0415; --muted:rgba(11,4,21,.58);
                --sans: "Inter", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
                --serif: "Inter", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
            }
            *{ box-sizing:border-box; }
            .staticrypt-html, .staticrypt-body{ height:100%; }
            .staticrypt-body{ margin:0; }

            .staticrypt-content{
                height:100%;
                margin:0;
                /* page background (template_color_secondary) */
                background: #faf5f5;
                background-image:
                    radial-gradient(120% 80% at 50% -8%, rgba(135,173,138,.12), transparent 62%);
                font-family: var(--sans);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                display:flex; align-items:center; justify-content:center;
                padding: 24px;
            }

            .staticrypt-page{ width:100%; max-width:420px; margin:0; padding:0; }

            .staticrypt-form{
                position:relative; z-index:1;
                background: var(--bone-card);
                border:1px solid var(--hairline);
                border-radius:18px;
                margin:0;
                padding: 44px 40px 40px;
                text-align:center;
                box-shadow: 0 1px 2px rgba(11,4,21,.05), 0 18px 48px rgba(11,4,21,.10);
            }

            .qte-logo{ height:34px; width:auto; display:block; margin:0 auto 22px; fill:#0b0415; }

            .staticrypt-instructions{ margin:0 0 8px; }
            .staticrypt-title{
                font-family: var(--sans); font-weight:600;
                font-size: 27px; line-height:1.15; letter-spacing:-0.02em;
                color: var(--fg); margin:0 0 12px;
            }
            .staticrypt-instructions p:not(.staticrypt-title){
                font-family: var(--sans); font-size:14.5px; line-height:1.55;
                color: var(--muted); margin:0 auto; max-width:30ch;
            }

            .staticrypt-hr{ margin:24px 0; border:0; border-top:1px solid var(--hairline); }

            .staticrypt-password-container{
                position:relative; outline:0;
                background:#fff; width:100%;
                border:1px solid var(--hairline); border-radius:10px;
                margin:0 0 14px; box-sizing:border-box;
                transition: border-color .15s, box-shadow .15s;
            }
            .staticrypt-password-container:focus-within{
                border-color: #896cfc;
                box-shadow: 0 0 0 3px rgba(137,108,252,.18);
            }
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"]{
                background:transparent; border:0; outline:0;
                font-family: var(--sans); font-size:15px; color: var(--fg);
                padding:15px 44px 15px 16px; width:100%; border-radius:10px;
            }
            .staticrypt-form input::placeholder{ color: color-mix(in srgb, var(--fg) 38%, #fff); }

            .staticrypt-toggle-password-visibility{
                cursor:pointer; height:20px; width:20px;
                opacity:.5; padding:13px;
                position:absolute; right:0; top:50%; transform:translateY(-50%);
            }
            .staticrypt-toggle-password-visibility:hover{ opacity:.8; }

            label.staticrypt-remember{
                display:flex; align-items:center; justify-content:flex-start;
                font-family: var(--sans); font-size:13.5px; color: var(--muted);
                margin:0 0 18px;
            }
            .staticrypt-remember input[type="checkbox"]{
                width:16px; height:16px; accent-color: #896cfc;
                margin-right:9px;
            }

            .staticrypt-form .staticrypt-decrypt-button{
                text-transform:none; letter-spacing:.01em; font-weight:700;
                outline:0; width:100%; border:0; border-radius:9999px;
                background: #896cfc;
                padding:15px; color:#F4F1E8;
                font-family: var(--sans); font-size:15px; cursor:pointer;
                transition: filter .15s, transform .15s;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover{ filter:brightness(108%); transform:translateY(-1px); }
            .staticrypt-form .staticrypt-decrypt-button:active{ transform:none; }

            .dc-foot{
                margin-top:22px; font-family: var(--sans);
                font-size:11.5px; letter-spacing:.02em; color: var(--muted);
            }

            .hidden{ display:none !important; }

            .staticrypt-spinner-container{ height:100%; display:flex; align-items:center; justify-content:center; background:#faf5f5; }
            .staticrypt-spinner{
                display:inline-block; width:2rem; height:2rem;
                border:0.25em solid rgba(11,4,21,.22); border-right-color:transparent;
                border-radius:50%; animation: spinner-border .75s linear infinite;
            }
            @keyframes spinner-border{ 100%{ transform:rotate(360deg); } }

            @media screen and (-webkit-min-device-pixel-ratio:0){
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"]{ font-size:16px; }
            }
        </style>
    </head>
